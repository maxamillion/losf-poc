name: Feature Request
description: Propose a new feature for the project
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting a feature! Please fill out the details below
        so the LOSF pipeline can understand and implement your request.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: >
        Provide a clear and detailed description of the feature you'd like.
        Include what problem it solves and why it's needed.
      placeholder: "Describe the feature..."
    validations:
      required: true

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria
      description: >
        List the specific criteria that must be met for this feature to be
        considered complete. Use a checklist format.
      placeholder: |
        - [ ] Criterion 1
        - [ ] Criterion 2
        - [ ] Criterion 3
    validations:
      required: true

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: >
        Any additional context, mockups, references, or technical details
        that would help with implementation.
      placeholder: "Any extra information..."
    validations:
      required: false

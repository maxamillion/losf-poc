name: "LOSF: Automated Development Pipeline"

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  dev-pipeline:
    if: github.event.label.name == 'approved'
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      GEMINI3_THINKING_LEVEL: "high"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Goose CLI
        run: curl -fsSL https://github.com/block/goose/releases/latest/download/download_cli.sh | CONFIGURE=false bash

      - name: Configure Goose
        run: |
          mkdir -p ~/.config/goose
          cat > ~/.config/goose/config.yaml << 'EOF'
          provider: gemini
          model: gemini-3.1-pro-preview
          keyring: false
          EOF

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Create working branch
        run: |
          BRANCH_NAME="losf/issue-${{ github.event.issue.number }}"
          git checkout -b "$BRANCH_NAME"
          echo "BRANCH_NAME=$BRANCH_NAME" >> "$GITHUB_ENV"

      - name: Write issue body to scratchpad
        run: |
          mkdir -p .goose/scratchpad
          cat > .goose/scratchpad/issue-body.md << 'ISSUE_EOF'
          ${{ github.event.issue.body }}
          ISSUE_EOF

      - name: Run LOSF development pipeline
        run: |
          goose run --recipe .goose/recipes/dev-pipeline.yaml \
            -p issue_title="${{ github.event.issue.title }}" \
            -p issue_number="${{ github.event.issue.number }}"

      - name: Commit and push changes
        run: |
          git config user.name "losf-bot[bot]"
          git config user.email "losf-bot[bot]@users.noreply.github.com"
          git add -A
          # Remove scratchpad files from the commit
          git reset HEAD .goose/scratchpad/ 2>/dev/null || true
          git commit -m "losf: implement issue #${{ github.event.issue.number }}

          Automated implementation for: ${{ github.event.issue.title }}

          Resolves #${{ github.event.issue.number }}"
          git push origin "$BRANCH_NAME"

      - name: Create pull request
        id: create-pr
        run: |
          # Read QE verdict if it exists for the PR body
          QE_VERDICT=""
          if [ -f .goose/scratchpad/qe-verdict.md ]; then
            QE_VERDICT=$(cat .goose/scratchpad/qe-verdict.md)
          fi

          PR_URL=$(gh pr create \
            --title "losf: ${{ github.event.issue.title }}" \
            --body "$(cat <<EOF
          ## Automated Implementation

          This PR was automatically generated by the Lights-Out Software Factory (LOSF)
          pipeline in response to issue #${{ github.event.issue.number }}.

          **Issue:** #${{ github.event.issue.number }} — ${{ github.event.issue.title }}

          ## QE Review

          ${QE_VERDICT:-No QE verdict file found.}

          ---
          *Generated by LOSF — review before merging.*
          EOF
          )" \
            --base main \
            --head "$BRANCH_NAME")
          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Comment on issue (success)
        if: success()
        run: |
          gh issue comment ${{ github.event.issue.number }} \
            --body "LOSF pipeline completed successfully! :rocket:

          Pull request created: ${{ steps.create-pr.outputs.pr_url }}

          Please review the PR and merge when ready."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Comment on issue (failure)
        if: failure()
        run: |
          gh issue comment ${{ github.event.issue.number }} \
            --body "LOSF pipeline failed. :x:

          Please check the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.

          Manual intervention may be required."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
